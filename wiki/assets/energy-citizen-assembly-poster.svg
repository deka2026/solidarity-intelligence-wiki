<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1013" font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3f7"/>
      <stop offset="1" stop-color="#e4f3fb"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7d98a"/>
      <stop offset="1" stop-color="#7fc466"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="720" height="1013" fill="url(#sky)"/>

  <!-- confetti -->
  <g opacity="0.85">
    <circle cx="70" cy="40" r="7" fill="#f4a7c3"/>
    <circle cx="150" cy="90" r="9" fill="#8fd3a0"/>
    <rect x="250" y="30" width="16" height="10" rx="3" fill="#ffd76a" transform="rotate(20 258 35)"/>
    <rect x="470" y="34" width="16" height="10" rx="3" fill="#8fd3a0" transform="rotate(-15 478 39)"/>
    <circle cx="600" cy="60" r="8" fill="#f4a7c3"/>
    <circle cx="660" cy="110" r="6" fill="#ffd76a"/>
    <path d="M95 150 q6 -14 12 0 q6 14 12 0" fill="none" stroke="#7fbfe0" stroke-width="3"/>
    <circle cx="120" cy="120" r="12" fill="#cfe8f7"/><path d="M120 132 v18" stroke="#bcd" stroke-width="1.5"/>
    <circle cx="620" cy="330" r="11" fill="#cfe8f7"/><path d="M620 341 v16" stroke="#bcd" stroke-width="1.5"/>
  </g>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.95">
    <ellipse cx="120" cy="470" rx="120" ry="46"/>
    <ellipse cx="360" cy="450" rx="180" ry="60"/>
    <ellipse cx="600" cy="470" rx="130" ry="48"/>
    <rect x="0" y="470" width="720" height="40" />
  </g>

  <!-- title -->
  <text x="360" y="120" text-anchor="middle" font-size="34" font-weight="800" fill="#57b04a">제1회</text>
  <text x="360" y="185" text-anchor="middle" font-size="58" font-weight="900" fill="#3fa93f">모두의 에너지시민회의</text>
  <text x="360" y="243" text-anchor="middle" font-size="30" font-weight="800" fill="#2f9e8f">시민이 만드는</text>
  <text x="360" y="286" text-anchor="middle" font-size="30" font-weight="800" fill="#2f9e8f">도시형 햇빛소득마을과 에너지 전환</text>
  <text x="360" y="330" text-anchor="middle" font-size="19" font-weight="700" fill="#4a7a86">"도시에서도 우리 동네가 직접</text>
  <text x="360" y="356" text-anchor="middle" font-size="19" font-weight="700" fill="#4a7a86">햇빛으로 에너지를 만들 수 있다면 어떨까요?"</text>

  <!-- ground -->
  <path d="M0 560 Q360 500 720 560 L720 900 L0 900 Z" fill="url(#hill)"/>

  <!-- city skyline (simplified) -->
  <g fill="#8fc9db">
    <rect x="40" y="540" width="30" height="80"/><rect x="76" y="560" width="26" height="60"/>
    <rect x="108" y="525" width="22" height="95"/><rect x="560" y="545" width="26" height="75"/>
    <rect x="592" y="560" width="22" height="60"/><rect x="620" y="520" width="28" height="100" fill="#efd873"/>
  </g>
  <!-- solar panels -->
  <g fill="#2b5c8a">
    <g transform="translate(150 600)"><rect x="0" y="0" width="70" height="42" rx="2" transform="skewX(-12)"/><line x1="24" y1="0" x2="10" y2="42" stroke="#bcd8ea"/><line x1="47" y1="0" x2="33" y2="42" stroke="#bcd8ea"/></g>
    <g transform="translate(500 600)"><rect x="0" y="0" width="70" height="42" rx="2" transform="skewX(-12)"/><line x1="24" y1="0" x2="10" y2="42" stroke="#bcd8ea"/><line x1="47" y1="0" x2="33" y2="42" stroke="#bcd8ea"/></g>
  </g>
  <!-- trees -->
  <g><circle cx="300" cy="600" r="20" fill="#5fae4f"/><rect x="297" y="616" width="6" height="16" fill="#8a6a44"/>
     <circle cx="430" cy="596" r="24" fill="#4f9f43"/><rect x="427" y="616" width="6" height="18" fill="#8a6a44"/></g>
  <!-- cyclist (simple) -->
  <g stroke="#e07b39" stroke-width="4" fill="none"><circle cx="330" cy="672" r="14"/><circle cx="376" cy="672" r="14"/><path d="M330 672 L353 650 L376 672 M353 650 L360 636"/></g>
  <circle cx="353" cy="628" r="7" fill="#e07b39"/>

  <!-- info card -->
  <rect x="70" y="600" width="580" height="270" rx="18" fill="#eaf6df" opacity="0.96"/>
  <g font-size="17" fill="#333">
    <g font-size="13" font-weight="800" fill="#fff">
      <rect x="92" y="620" width="60" height="24" rx="12" fill="#7cc24f"/><text x="122" y="637" text-anchor="middle">일 시</text>
      <rect x="92" y="654" width="60" height="24" rx="12" fill="#7cc24f"/><text x="122" y="671" text-anchor="middle">장 소</text>
      <rect x="82" y="688" width="80" height="24" rx="12" fill="#7cc24f"/><text x="122" y="705" text-anchor="middle">참여 대상</text>
      <rect x="72" y="738" width="100" height="24" rx="12" fill="#4aa39a"/><text x="122" y="755" text-anchor="middle">주요 프로그램</text>
      <rect x="82" y="800" width="80" height="24" rx="12" fill="#7cc24f"/><text x="122" y="817" text-anchor="middle">신청 방법</text>
      <rect x="92" y="834" width="60" height="24" rx="12" fill="#7cc24f"/><text x="122" y="851" text-anchor="middle">문 의</text>
    </g>
    <text x="180" y="638" font-weight="700">6/27(토) 13:00~18:00</text>
    <text x="180" y="672" font-weight="700">명지대 인문캠퍼스 방목학술정보관 국제회의장 <tspan font-size="12" font-weight="400">(서울 서대문구 거북골로 34)</tspan></text>
    <text x="180" y="706" font-weight="700">도시형 햇빛소득마을에 관심있는 시민 100인</text>
    <text x="180" y="726" font-size="13">(선착순 접수, 사전신청 및 사전교육 수강 필수)</text>
    <text x="180" y="756" font-weight="700">기조발제, 도시형 에너지 전환 모델 설계 및 정책 제안, 숙의 및 토론</text>
    <text x="82" y="784" font-size="12" fill="#4a7a45">※ 본 행사에서 제안된 도시형 설계 모델과 정책은 범정부 햇빛소득마을 추진단 등 관련 부처에 전달됩니다.</text>
    <text x="180" y="818" font-weight="700">신청 링크(readmore.do/energytalk) 또는 우측 QR</text>
    <text x="180" y="852" font-weight="700">mjsolar2026@gmail.com</text>
  </g>
  <!-- QR placeholder -->
  <g transform="translate(560 792)"><rect width="66" height="66" fill="#fff" stroke="#333"/>
    <g fill="#111"><rect x="6" y="6" width="18" height="18"/><rect x="42" y="6" width="18" height="18"/><rect x="6" y="42" width="18" height="18"/>
    <rect x="30" y="30" width="6" height="6"/><rect x="42" y="42" width="6" height="6"/><rect x="54" y="54" width="6" height="6"/><rect x="30" y="48" width="6" height="6"/><rect x="48" y="30" width="6" height="6"/></g></g>

  <!-- co-hosts band -->
  <rect x="0" y="900" width="720" height="113" fill="#5aa84e"/>
  <text x="360" y="936" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">공동주최</text>
  <text x="360" y="964" text-anchor="middle" font-size="14" fill="#f2fbee">명지대학교 방목기초교육대학, 녹색전환연구소, 에너지기후정책연구소,</text>
  <text x="360" y="986" text-anchor="middle" font-size="14" fill="#f2fbee">여성환경연대, 시민발전이종협동조합연합회, 햇빛배당전국네트워크</text>
</svg>
